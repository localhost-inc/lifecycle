<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lifecycle</title>
    <script>
      // Synchronously apply theme before CSS paints to prevent flash
      (function () {
        var LIGHT_THEMES = { light: 1, "github-light": 1 };
        var DARK_THEMES = {
          dark: 1,
          "github-dark": 1,
          nord: 1,
          monokai: 1,
          catppuccin: 1,
          dracula: 1,
          "rose-pine": 1,
        };
        var theme = "dark";
        try {
          var stored = JSON.parse(localStorage.getItem("lifecycle.desktop.theme") || "{}");
          if (
            stored.theme &&
            (stored.theme === "system" ||
              stored.theme in LIGHT_THEMES ||
              stored.theme in DARK_THEMES)
          ) {
            theme = stored.theme;
          }
        } catch (e) {}
        if (theme === "system") {
          theme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        var d = document.documentElement;
        d.dataset.theme = theme;
        d.style.colorScheme = theme in DARK_THEMES ? "dark" : "light";
        if (theme in DARK_THEMES) d.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
