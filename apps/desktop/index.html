<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lifecycle</title>
    <script>
      // Apply dark theme immediately to prevent flash. The real theme is loaded
      // async from ~/.lifecycle/settings.json by ConfigProvider on mount.
      (function () {
        var d = document.documentElement;
        d.dataset.theme = "dark";
        d.style.colorScheme = "dark";
        d.classList.add("dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
