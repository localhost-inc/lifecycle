name: Bug report
description: Report a reproducible defect in the current implementation
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the defect.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit SHA, branch, or app version if known.
      placeholder: main / commit SHA / v0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, Rust toolchain, and any other relevant setup details.
      placeholder: macOS 15, Bun 1.3.10, Rust stable
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Share only the minimum necessary details and redact secrets.
      render: shell
